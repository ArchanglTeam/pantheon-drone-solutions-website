<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon Drone Solutions | Commercial Drone Exterior Cleaning BC & Alberta</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="logo-180.png">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [active, setActive] = useState("home");
      const [submitted, setSubmitted] = useState(false);
      const onNav = (k) => {
        setActive(k);
        const el = document.getElementById(
          k === "home" ? "hero" : k === "services" ? "why" : k === "process" ? "process" : k === "technology" ? "credentials" : k === "about" ? "credentials" : k === "contact" ? "contact" : k === "faq" ? "credentials" : "hero"
        );
        if (el) el.scrollIntoView({ behavior: "smooth" });
      };
      return (
        <>
          <Nav active={active} onNav={onNav} />
          <Hero onCta={() => onNav("contact")} />
          <FeatureGrid />
          <ProcessSteps />
          <Credentials />
          <ContactForm submitted={submitted} onSubmit={() => setSubmitted(true)} />
          <Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
