<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantheon Drone Solutions | Commercial Drone Exterior Cleaning BC & Alberta</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [active, setActive] = useState("home");
      const [submitted, setSubmitted] = useState(false);

      const onNav = (k) => {
        setActive(k);
        const el = document.getElementById(
          k === "home" ? "hero" :
          k === "services" ? "why" :
          k === "process" ? "process" :
          k === "technology" ? "credentials" :
          k === "about" ? "credentials" :
          k === "contact" ? "contact" :
          k === "faq" ? "credentials" : "hero"
        );
        if (el) el.scrollIntoView({ behavior: "smooth" });
      };

      return (
        <>
          <Nav active={active} onNav={onNav} />
          <Hero onCta={() => onNav("contact")} />
          <FeatureGrid />
          <ProcessSteps />
          <Credentials />
          <ContactForm submitted={submitted} onSubmit={() => setSubmitted(true)} />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
